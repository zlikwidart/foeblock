<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>STLtoday Foe Thread Filter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.4;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      font: inherit;
      padding: 10px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .status {
      margin-top: 12px;
      font-weight: bold;
    }
    code {
      background: #f2f2f2;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>STLtoday Foe Thread Filter</h1>
  <p>
    The extension tries to read your phpBB foe list automatically. If that page layout changes or is unavailable,
    you can enter usernames here as a fallback. Use one username per line or separate them with commas.
  </p>
  <textarea id="foes" placeholder="Example:\nuser1\nuser2"></textarea>
  <br>
  <button id="save">Save</button>
  <div class="status" id="status"></div>
  <p>
    After saving, refresh any open <code>viewforum.php</code> page.
  </p>
  <script src="options.js"></script>
</body>
</html>
