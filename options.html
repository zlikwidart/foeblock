<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>STLtoday Foe Thread Filter Options</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      max-width: 760px;
      line-height: 1.45;
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    p { margin: 0 0 12px; }
    textarea {
      width: 100%;
      min-height: 260px;
      box-sizing: border-box;
      font: inherit;
      padding: 12px;
      margin: 8px 0 12px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button { font: inherit; padding: 10px 16px; cursor: pointer; }
    #status { min-height: 1.5em; opacity: 0.85; }
    .note { opacity: 0.8; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>STLtoday Foe Thread Filter</h1>
  <p>Enter extra usernames to hide in addition to the names from your forum foe list.</p>
  <p class="note">Use one username per line or separate names with commas.</p>

  <label for="manualFoes"><strong>Manual block list</strong></label>
  <textarea id="manualFoes" spellcheck="false" placeholder="Example:
leedog68
some_other_user"></textarea>

  <div class="row">
    <button id="saveButton" type="button">Save</button>
    <span id="status" aria-live="polite"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
